services:
  postgres:
    image: postgres:16-alpine
    container_name: budgetpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budgetpro
    ports:
      - '5432:5432'
    volumes:
      - budgetpro_pgdata:/var/lib/postgresql/data

volumes:
  budgetpro_pgdata:
